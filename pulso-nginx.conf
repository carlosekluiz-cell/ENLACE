# PULSO NETWORK — nginx configuration
# pulso.network + www → static marketing site
# app.pulso.network → Next.js app dashboard (port 4100)
# api.pulso.network → FastAPI backend (port 8000)

# Rate limiting for API
limit_req_zone $binary_remote_addr zone=pulso_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=pulso_auth:10m rate=10r/m;

# Upstream services
upstream pulso_app {
    server 127.0.0.1:4100;
    keepalive 32;
}

upstream pulso_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name pulso.network www.pulso.network app.pulso.network api.pulso.network;
    return 301 https://$host$request_uri;
}

# ── pulso.network + www — static marketing site ──
server {
    listen 443 ssl http2;
    server_name pulso.network www.pulso.network;

    ssl_certificate /etc/letsencrypt/live/pulso.network/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulso.network/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:PulsoSSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    root /home/dev/www/pulso.network;
    index index.html;

    # Next.js static export: try file, then .html, then 404
    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    # Cache static assets (immutable hashed files)
    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /fonts/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }
}

# ── app.pulso.network — Next.js app dashboard ──
server {
    listen 443 ssl http2;
    server_name app.pulso.network;

    ssl_certificate /etc/letsencrypt/live/pulso.network/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulso.network/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:PulsoSSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass http://pulso_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── api.pulso.network — FastAPI backend ──
server {
    listen 443 ssl http2;
    server_name api.pulso.network;

    ssl_certificate /etc/letsencrypt/live/pulso.network/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulso.network/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:PulsoSSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Access-Control-Allow-Origin "https://app.pulso.network" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # Rate limit auth endpoints
    location ~ ^/api/v1/auth/(login|register|forgot-password) {
        limit_req zone=pulso_auth burst=5 nodelay;
        proxy_pass http://pulso_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API rate limit
    location /api/ {
        limit_req zone=pulso_api burst=20 nodelay;
        proxy_pass http://pulso_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_read_timeout 120s;
    }

    # SSE endpoint (long-lived connections)
    location /api/v1/sse {
        proxy_pass http://pulso_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://pulso_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
