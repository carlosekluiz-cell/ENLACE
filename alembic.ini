# ENLACE Alembic Configuration
#
# To run migrations:
#   alembic upgrade head          — apply all pending migrations
#   alembic revision --autogenerate -m "description"  — generate a new migration
#   alembic downgrade -1          — rollback one migration

[alembic]
script_location = migrations
prepend_sys_path = .

# Database URL — overridden at runtime from python.api.config.settings
# Uses the async driver (asyncpg) through SQLAlchemy's async engine
sqlalchemy.url = postgresql+asyncpg://enlace:@localhost:5432/enlace

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
