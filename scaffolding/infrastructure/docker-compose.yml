# IMPORTANT: Copy .env.example to .env and set all required secrets before running.
# Do NOT use default/fallback passwords in production.
version: '3.9'

services:
  # ═══ PostgreSQL with PostGIS ═══
  postgres:
    image: postgis/postgis:16-3.4
    container_name: enlace-postgres
    environment:
      POSTGRES_DB: enlace
      POSTGRES_USER: enlace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enlace -d enlace"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: '2gb'  # PostGIS needs extra shared memory for spatial operations

  # ═══ Redis ═══
  redis:
    image: redis:7-alpine
    container_name: enlace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══ MinIO (S3-compatible object storage) ═══
  minio:
    image: minio/minio:latest
    container_name: enlace-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══ MinIO bucket initialization ═══
  minio-init:
    image: minio/mc:latest
    container_name: enlace-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set enlace http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing enlace/terrain;
      mc mb --ignore-existing enlace/landcover;
      mc mb --ignore-existing enlace/coverage-maps;
      mc mb --ignore-existing enlace/reports;
      mc mb --ignore-existing enlace/raw-downloads;
      echo 'Buckets created.';
      "

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
