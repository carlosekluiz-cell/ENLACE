# ============================================================================
# ENLACE Platform — Docker Compose
#
# REQUIRED: Copy .env.example to .env and set all required values before
# running docker compose up. This file will NOT start without a valid .env.
# ============================================================================
version: '3.9'

services:
  # ═══ PostgreSQL with PostGIS ═══
  postgres:
    image: postgis/postgis:16-3.4
    container_name: enlace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enlace -d enlace"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: '2gb'  # PostGIS needs extra shared memory for spatial operations
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ═══ Redis ═══
  redis:
    image: redis:7.2-alpine
    container_name: enlace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ═══ MinIO (S3-compatible object storage) ═══
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: enlace-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # API
      # Console port (9001) not exposed — access via internal network only
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ═══ MinIO bucket initialization ═══
  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    container_name: enlace-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set enlace http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing enlace/terrain;
      mc mb --ignore-existing enlace/landcover;
      mc mb --ignore-existing enlace/coverage-maps;
      mc mb --ignore-existing enlace/reports;
      mc mb --ignore-existing enlace/raw-downloads;
      echo 'Buckets created.';
      "
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
